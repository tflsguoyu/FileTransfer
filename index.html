<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>FileTransfer</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">局域网直传</p>
          <h1>FileTransfer</h1>
        </div>
        <button class="icon-button" id="installButton" type="button" hidden aria-label="安装">
          <span>安装</span>
        </button>
      </section>

      <section class="status-panel" id="statusPanel">
        <div>
          <p class="label">连接状态</p>
          <p class="status" id="statusText">等待开始</p>
        </div>
        <div class="pill" id="routePill">未连接</div>
      </section>

      <section class="tabs" role="tablist" aria-label="传输模式">
        <button class="tab active" id="sendTab" type="button" role="tab" aria-selected="true">发送</button>
        <button class="tab" id="receiveTab" type="button" role="tab" aria-selected="false">接收</button>
      </section>

      <section class="panel active" id="sendPanel">
        <div class="dropzone" id="dropzone">
          <input id="fileInput" type="file" multiple />
          <div>
            <p class="drop-title">选择或拖入文件</p>
            <p class="drop-copy">文件会在连接建立后直接传给对方浏览器</p>
          </div>
        </div>

        <div class="file-list" id="fileList"></div>

        <button class="primary" id="createRoomButton" type="button" disabled>生成短码</button>

        <div class="code-box" id="sendCodeBox" hidden>
          <p class="label">让接收端输入</p>
          <p class="code" id="roomCode">------</p>
        </div>
      </section>

      <section class="panel" id="receivePanel">
        <label class="field">
          <span>输入 6 位短码</span>
          <input id="joinCodeInput" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="例如 482913" />
        </label>
        <button class="primary" id="joinRoomButton" type="button">加入接收</button>

        <div class="received" id="receivedList"></div>
      </section>

      <section class="transfer" id="transferPanel" hidden>
        <div class="transfer-header">
          <div>
            <p class="label">传输进度</p>
            <p class="transfer-name" id="transferName">等待文件</p>
          </div>
          <p class="metric" id="speedText">0 MB/s</p>
        </div>
        <div class="progress">
          <div id="progressBar"></div>
        </div>
        <p class="muted" id="progressText">0%</p>
      </section>

      <section class="settings">
        <details>
          <summary>信令地址</summary>
          <label class="field compact">
            <span>Cloudflare Worker URL</span>
            <input id="signalingUrlInput" placeholder="https://your-worker.workers.dev" />
          </label>
          <button class="secondary" id="saveSettingsButton" type="button">保存</button>
        </details>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
