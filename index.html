<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>小π Drop</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">同路由器 · 浏览器直连</p>
          <h1>小π Drop</h1>
        </div>
        <button class="icon-button" id="installButton" type="button" hidden aria-label="安装">
          <span>安装</span>
        </button>
      </section>

      <section class="status-panel" id="statusPanel" aria-live="polite">
        <div>
          <p class="label">连接状态</p>
          <p class="status" id="statusText">等待开始</p>
        </div>
        <div class="pill" id="routePill">未连接</div>
      </section>

      <section class="mode-grid" role="tablist" aria-label="传输模式">
        <button class="mode-card active" id="sendTab" type="button" role="tab" aria-selected="true">
          <span class="mode-icon">↑</span>
          <span>
            <strong>发送文件</strong>
            <small>选择后生成短码</small>
          </span>
        </button>
        <button class="mode-card" id="receiveTab" type="button" role="tab" aria-selected="false">
          <span class="mode-icon">↓</span>
          <span>
            <strong>接收文件</strong>
            <small>输入对方短码</small>
          </span>
        </button>
      </section>

      <section class="panel active" id="sendPanel">
        <div class="dropzone" id="dropzone">
          <input id="fileInput" type="file" multiple />
          <div>
            <p class="drop-title">点这里选择文件</p>
            <p class="drop-copy">也可以拖入多个文件</p>
          </div>
        </div>

        <div class="file-list" id="fileList"></div>

        <button class="primary" id="createRoomButton" type="button" disabled>生成发送码</button>

        <div class="code-box" id="sendCodeBox" hidden>
          <p class="label">让另一台设备输入</p>
          <p class="code" id="roomCode">------</p>
        </div>
      </section>

      <section class="panel" id="receivePanel">
        <label class="field code-field">
          <span>输入发送码</span>
          <input id="joinCodeInput" inputmode="numeric" autocomplete="one-time-code" maxlength="6" aria-label="输入 6 位发送码" />
          <div class="code-digits" id="codeDigits" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </label>
        <button class="primary" id="joinRoomButton" type="button">加入接收</button>

        <div class="received" id="receivedList"></div>
      </section>

      <section class="transfer" id="transferPanel" hidden>
        <div class="transfer-header">
          <div>
            <p class="label">正在传输</p>
            <p class="transfer-name" id="transferName">等待文件</p>
          </div>
          <p class="metric" id="speedText">0 MB/s</p>
        </div>
        <div class="progress">
          <div id="progressBar"></div>
        </div>
        <p class="muted" id="progressText">0%</p>
      </section>

      <section class="settings" hidden>
        <details>
          <summary>信令地址</summary>
          <label class="field compact">
            <span>Cloudflare Worker URL</span>
            <input id="signalingUrlInput" placeholder="https://your-worker.workers.dev" />
          </label>
          <button class="secondary" id="saveSettingsButton" type="button">保存</button>
        </details>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
